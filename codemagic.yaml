workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
      - name: Create IPA
        script: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          cp -r DerivedData/Build/Products/Release-iphoneos/Runner.app Payload/
          zip -r iChan.ipa Payload/
    artifacts:
      - "*.ipa"
      - flutter_drive.log
