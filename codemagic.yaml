workflows:
  ios-workflow:
    name: iOS Unsigned Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build unsigned iOS
        script: flutter build ios --release --no-codesign
      - name: Package IPA
        script: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r iChan.ipa Payload/
    artifacts:
      - iChan.ipa
